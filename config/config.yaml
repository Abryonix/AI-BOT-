project:
  name: nifty50-ai-swing-trading
  timezone: Asia/Kolkata
  base_currency: INR
universe:
  index_symbol: "^NSEI"
  source: yahoo_finance
  constituents:
    - RELIANCE.NS
    - TCS.NS
    - HDFCBANK.NS
    - ICICIBANK.NS
    - INFY.NS
    - ITC.NS
    - LT.NS
    - SBIN.NS
    - BHARTIARTL.NS
    - AXISBANK.NS
data:
  start_date: "2014-01-01"
  cache_dir: data/cache
  free_sources:
    ohlcv: yahoo_finance
    options: nse_public_chain
    fundamentals: yahoo_finance_or_screener_exports
    macro: rbi_mospi_worldbank_fred_free_endpoints
features:
  horizons: [1, 5]
  technical_windows: [5, 10, 14, 20, 50, 100, 200]
  volatility_windows: [5, 10, 21, 63]
models:
  random_seed: 42
  walk_forward:
    train_days: 756
    validation_days: 126
    test_days: 63
  objective_weights:
    cagr: 0.25
    sharpe: 0.25
    sortino: 0.20
    max_drawdown: 0.20
    calmar: 0.10
portfolio:
  initial_capital: 500000
  max_gross_exposure: 0.75
  max_net_exposure: 0.50
  max_position_weight: 0.12
  max_names: 5
  allow_short: true
  min_cash_weight: 0.10
execution:
  paper_trading: true
  live_trading_enabled: false
  brokerage_bps: 3
  slippage_bps: 5
  stt_bps: 10
  min_order_value: 100
risk:
  max_daily_loss_pct: 0.01
  max_drawdown_pct: 0.08
  volatility_target_annual: 0.12
  kill_switch_enabled: true
rl:
  algorithms: [PPO, A2C, DQN]
  reward_drawdown_penalty: 2.0
  reward_turnover_penalty: 0.25
  total_timesteps: 10000
